<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCUBE – Knowledge Base</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- HEADER -->
<div class="admin-header">
    <img src="assets/agent.png" class="avatar" alt="LUNA">
    <div>
        <div class="title">MCUBE <span>AI</span></div>
        <div class="subtitle">Knowledge Base Manager</div>
    </div>
    <a href="index.html" class="back-btn">← Chat</a>
</div>

<!-- MAIN -->
<div class="admin-body">

    <!-- LEFT: Add sources -->
    <div class="panel">

        <!-- Upload Document -->
        <div class="card">
            <div class="card-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                Upload Document
            </div>
            <div
                id="drop-zone"
                class="drop-zone"
                ondragover="event.preventDefault(); this.classList.add('drag-over')"
                ondragleave="this.classList.remove('drag-over')"
                ondrop="handleDrop(event)"
                onclick="document.getElementById('file-input').click()"
            >
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <p>Drag & drop or <u>click to browse</u></p>
                <small>PDF, DOCX, TXT supported</small>
            </div>
            <input type="file" id="file-input" accept=".pdf,.docx,.txt" style="display:none" onchange="uploadFile(this.files[0])">
            <div id="upload-status" class="status-msg"></div>
        </div>

        <!-- Add Website -->
        <div class="card">
            <div class="card-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                Crawl Website
            </div>
            <div class="form-group">
                <label>Page URL</label>
                <input type="url" id="website-url" placeholder="https://mcube.in/about" />
            </div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="website-name" placeholder="e.g. About MCUBE" />
            </div>
            <button class="btn-primary" onclick="addWebsite()">Crawl & Add</button>
            <div id="website-status" class="status-msg"></div>
        </div>

    </div>

    <!-- RIGHT: Knowledge sources list -->
    <div class="panel">
        <div class="card sources-card">
            <div class="card-title" style="justify-content: space-between;">
                <span style="display:flex;align-items:center;gap:8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                    Knowledge Sources
                </span>
                <span id="source-count" class="badge">0</span>
            </div>
            <div id="sources-list" class="sources-list">
                <div class="empty-state">No sources yet. Add documents or websites.</div>
            </div>
        </div>
    </div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="admin.js"></script>
</body>
</html>
