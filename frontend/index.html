<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MCUBE LUNA AI Support Chatbot">
    <title>MCUBE - LUNA AI</title>

    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <div class="header">
        <img src="assets/agent.png" class="avatar" alt="LUNA AI Avatar">
        <div>
            <div class="title">MCUBE <span>AI</span></div>
            <div class="subtitle">LUNA - Support Agent</div>
        </div>
    </div>

    <!-- CHAT -->
    <div id="chat-box" class="chat-box">

        <div class="bot-message">
            Hello! I'm <b>LUNA</b>, your AI support assistant.<br>
            How may I assist you today?
        </div>

        <div class="suggestions">
            <button onclick="quickMsg('Tell me about services')">Services</button>
            <button onclick="quickMsg('I need support')">Support</button>
        </div>

    </div>

    <!-- INPUT -->
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" />
        <button id="mic-btn" onclick="toggleRecording()" aria-label="Voice input" title="Voice input">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        <button id="send-btn" onclick="sendMessage()" aria-label="Send message">&#10148;</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
